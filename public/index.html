<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>영상 다운로더</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    max-width: 640px;
    margin: 60px auto;
    padding: 0 20px;
    line-height: 1.5;
  }
  h1 { font-size: 1.4rem; margin-bottom: 4px; }
  p.sub { color: #888; margin-top: 0; font-size: 0.9rem; }
  .row { display: flex; gap: 8px; margin: 16px 0; }
  input[type="text"] {
    flex: 1;
    padding: 10px 12px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 1rem;
  }
  button {
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    background: #2563eb;
    color: white;
    font-size: 1rem;
    cursor: pointer;
  }
  button:disabled { background: #999; cursor: not-allowed; }
  #result { margin-top: 20px; display: none; }
  #result img { max-width: 100%; border-radius: 8px; }
  select { padding: 8px; border-radius: 8px; border: 1px solid #ccc; font-size: 1rem; }
  #status { margin-top: 12px; font-size: 0.9rem; color: #888; min-height: 1.2em; }
  #error { color: #dc2626; margin-top: 12px; font-size: 0.9rem; }
</style>
</head>
<body>
  <h1>영상 다운로더</h1>
  <p class="sub">YouTube, TikTok 등 링크를 붙여넣으세요.</p>

  <div class="row">
    <input type="text" id="url" placeholder="https://..." />
    <button id="fetchBtn">정보 가져오기</button>
  </div>

  <div id="error"></div>

  <div id="result">
    <img id="thumb" />
    <h3 id="title"></h3>
    <div class="row">
      <select id="quality"></select>
      <button id="downloadBtn">다운로드</button>
    </div>
    <div id="status"></div>
  </div>

<script>
const urlInput = document.getElementById('url');
const fetchBtn = document.getElementById('fetchBtn');
const downloadBtn = document.getElementById('downloadBtn');
const result = document.getElementById('result');
const thumb = document.getElementById('thumb');
const title = document.getElementById('title');
const qualitySelect = document.getElementById('quality');
const statusEl = document.getElementById('status');
const errorEl = document.getElementById('error');

const qualityLabels = {
  best: '최고 화질',
  audio: '오디오만 (mp3)',
};

fetchBtn.addEventListener('click', async () => {
  const url = urlInput.value.trim();
  errorEl.textContent = '';
  result.style.display = 'none';
  if (!url) return;

  fetchBtn.disabled = true;
  fetchBtn.textContent = '불러오는 중...';
  try {
    const res = await fetch('/api/info?url=' + encodeURIComponent(url));
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || '오류가 발생했습니다.');

    title.textContent = data.title || '';
    thumb.src = data.thumbnail || '';

    qualitySelect.innerHTML = '';
    const opt = (value, label) => {
      const o = document.createElement('option');
      o.value = value;
      o.textContent = label;
      qualitySelect.appendChild(o);
    };
    opt('best', qualityLabels.best);
    (data.qualities || []).forEach((h) => opt(String(h), `${h}p`));
    opt('audio', qualityLabels.audio);

    result.style.display = 'block';
  } catch (err) {
    errorEl.textContent = err.message;
  } finally {
    fetchBtn.disabled = false;
    fetchBtn.textContent = '정보 가져오기';
  }
});

downloadBtn.addEventListener('click', async () => {
  const url = urlInput.value.trim();
  const quality = qualitySelect.value;
  if (!url) return;

  statusEl.textContent = '다운로드 중... (화질에 따라 몇 분 걸릴 수 있습니다)';
  errorEl.textContent = '';
  downloadBtn.disabled = true;

  try {
    const apiUrl = '/api/download?url=' + encodeURIComponent(url) + '&quality=' + encodeURIComponent(quality);
    const res = await fetch(apiUrl);
    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      throw new Error(data.error || '다운로드에 실패했습니다.');
    }

    const disposition = res.headers.get('Content-Disposition') || '';
    const match = disposition.match(/filename="?([^"]+)"?/);
    const filename = match ? match[1] : 'video';

    const blob = await res.blob();
    const objectUrl = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = objectUrl;
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(objectUrl);

    statusEl.textContent = '다운로드 완료.';
  } catch (err) {
    errorEl.textContent = err.message;
    statusEl.textContent = '';
  } finally {
    downloadBtn.disabled = false;
  }
});
</script>
</body>
</html>
